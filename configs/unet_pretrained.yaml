# ============================================================
# Config: UNet + SimCLR Pretrained Encoder
# ============================================================

# ── Data — dùng preprocessed patches (chạy preprocess_patches.py trước) ──
data:
  patch_dir: "data/BraTS2020_patches"   # output của preprocess_patches.py
  ram_cache: false                       # true nếu RAM > 60GB

# ── Pretrained encoder từ train_simclr.py ──
pretrain:
  encoder_path: "outputs/simclr/best_encoder.pth"

# ── Output ──
output:
  dir:        "outputs/unet_pretrained"
  checkpoint: "outputs/unet_pretrained/latest_checkpoint.pth"
  best_model: "outputs/unet_pretrained/best_model.pth"

# ── Training ──
train:
  batch_size:  4      # T4=2 | L4/3090/4090=4 | A100-40G=8
  num_epochs:  150
  num_workers: 12      # = nproc ÷ 2
  seed:        42
  grad_accum:  1

# ── Fine-tune strategy ──
finetune:
  freeze_encoder_epochs: 10
  encoder_lr_scale:      0.05

# ── Optimizer ──
optimizer:
  lr:           2.0e-4
  weight_decay: 1.0e-4

# ── GPU Augmentation ──
augmentation:
  p_flip:   0.5
  p_noise:  0.5
  p_crop:   0.5
  p_cutout: 0.4
