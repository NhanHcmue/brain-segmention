# ============================================================
# Config: UNet Baseline — Random Initialization
# ⚠ Mọi giá trị phải giống unet_pretrained.yaml (trừ encoder_path và output dir)
# ============================================================

# ── Data ──
data:
  patch_dir: "data/BraTS2020_patches"   # cùng patches với pretrained
  ram_cache: false

# ── Không có pretrained encoder ──
pretrain:
  encoder_path: null

# ── Output ──
output:
  dir:        "outputs/unet_baseline"
  checkpoint: "outputs/unet_baseline/latest_checkpoint.pth"
  best_model: "outputs/unet_baseline/best_model.pth"

# ── Training (giống pretrained) ──
train:
  batch_size:  4
  num_epochs:  150
  num_workers: 12
  seed:        42     # ⚠ cùng seed → cùng train/val split
  grad_accum:  1

# ── Optimizer (giống pretrained) ──
optimizer:
  lr:           2.0e-4
  weight_decay: 1.0e-4

# ── GPU Augmentation (giống pretrained) ──
augmentation:
  p_flip:   0.5
  p_noise:  0.5
  p_crop:   0.5
  p_cutout: 0.4
